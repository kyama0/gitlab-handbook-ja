version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    # Dependabot rewrites `uses:` lines to the new SHA and updates the
    # trailing `# vX.Y.Z` comment automatically.
    commit-message:
      prefix: "chore(actions)"
    open-pull-requests-limit: 5
    # Wait a week before picking up new Action releases to dodge freshly
    # compromised tags. Security updates bypass cooldown automatically.
    cooldown:
      default-days: 7

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 5
    groups:
      astro:
        patterns:
          - "astro"
          - "@astrojs/*"
      tooling:
        patterns:
          - "typescript"
          - "tsx"
          - "@types/*"
    # npm is the most targeted ecosystem — be conservative, especially on
    # majors. Security updates are exempt.
    cooldown:
      default-days: 5
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3

  - package-ecosystem: terraform
    directory: /infra
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "chore(terraform)"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
