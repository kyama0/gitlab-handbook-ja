name: App CI

on:
  pull_request:
    branches:
      - main
    paths:
      - 'content/**'
      - 'layouts/**'
      - 'data/**'
      - 'assets/**'
      - 'static/**'
      - 'config/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'go.mod'
      - 'go.sum'
      - '.tool-versions'
      - '.github/workflows/app_ci.yml'
      - 'upstream/**'
      - '.gitmodules'

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: app-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Build the site with Hugo (matches the production deploy build).
  # `hugo` exits non-zero on shortcode/render errors, so passing CI implies
  # the same site can be deployed.
  # upstream submodule をチェックアウトして scripts/sync-data.sh を実行する
  # 必要がある。docsy-gitlab モジュールの一部ページが data/public/* を参照
  # しており、それらは upstream と同じく動的取得方式で供給する。
  # ---------------------------------------------------------------------------
  build:
    name: Hugo Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
          fetch-depth: 1

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: 'go.mod'

      - uses: peaceiris/actions-hugo@75d2e84710de30f6ff7268e08f310b60ef14033f # v3.0.0
        with:
          hugo-version: '0.151.0'
          extended: true

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node deps (postcss / autoprefixer for Docsy CSS pipeline)
        run: npm ci

      - name: Sync upstream public data (team.yml, tech_stack.yml, ...)
        run: bash upstream/scripts/sync-data.sh

      - name: Hugo build
        run: hugo --logLevel error

      - name: Pagefind index
        run: npx pagefind --site public

  # ---------------------------------------------------------------------------
  # Flag PRs that introduce new dependencies with known vulnerabilities or
  # incompatible licenses before they land.
  # ---------------------------------------------------------------------------
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
          # Reject copyleft licenses that would bind the entire codebase.
          deny-licenses: AGPL-1.0-or-later, AGPL-3.0-or-later, GPL-2.0-or-later, GPL-3.0-or-later

  # ---------------------------------------------------------------------------
  # Scan the diff for accidentally-committed secrets (API tokens, keys, etc.).
  # fetch-depth: 0 is required so gitleaks can diff the full history.
  # ---------------------------------------------------------------------------
  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
