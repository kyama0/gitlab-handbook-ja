name: App CI

on:
  pull_request:
    branches:
      - main
    paths:
      - 'content/**'
      - 'layouts/**'
      - 'data/**'
      - 'assets/**'
      - 'static/**'
      - 'config/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'go.mod'
      - 'go.sum'
      - '.tool-versions'
      - '.github/workflows/app_ci.yml'
      - 'upstream'
      - 'upstream/**'
      - '.gitmodules'

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: app-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Build the site with Hugo (matches the production deploy build).
  # `hugo` exits non-zero on shortcode/render errors, so passing CI implies
  # the same site can be deployed.
  # upstream submodule をチェックアウトして scripts/sync-data.sh を実行する
  # 必要がある。docsy-gitlab モジュールの一部ページが data/public/* を参照
  # しており、それらは upstream と同じく動的取得方式で供給する。
  # ---------------------------------------------------------------------------
  build:
    name: Hugo Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
          fetch-depth: 1

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'

      - uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3.2.1
        with:
          hugo-version: '0.151.0'
          extended: true

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node deps (postcss / autoprefixer for Docsy CSS pipeline)
        run: npm ci

      - name: Sync upstream public data (team.yml, tech_stack.yml, ...)
        # ワークアラウンド: release_post_managers.yml は www-gitlab-com から
        # 削除されて 404 を返すようになったが、upstream/scripts/sync-data.sh の
        # data_files にはまだ残っている。スクリプトは `set -eu` で走るため
        # 最初の 404 で sync 全体が落ち、Hugo ビルドに到達できない。
        # そこで対象エントリを sed で除外し、release-post-scheduling
        # shortcode（site.Data.public.release_post_managers.releases を range
        # する）が壊れないように空スタブを事前生成する。
        # upstream が参照を消したら本ステップは元に戻すこと。
        run: |
          sed -i '/release_post_managers\.yml/d' upstream/scripts/sync-data.sh
          mkdir -p data/public
          printf 'releases: []\n' > data/public/release_post_managers.yml
          bash upstream/scripts/sync-data.sh

      - name: Hugo build
        run: hugo --logLevel error

      - name: Pagefind index
        run: npx pagefind --site public

  # ---------------------------------------------------------------------------
  # Flag PRs that introduce new dependencies with known vulnerabilities or
  # incompatible licenses before they land.
  # ---------------------------------------------------------------------------
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
          # Reject copyleft licenses that would bind the entire codebase.
          deny-licenses: AGPL-1.0-or-later, AGPL-3.0-or-later, GPL-2.0-or-later, GPL-3.0-or-later

  # ---------------------------------------------------------------------------
  # Scan the diff for accidentally-committed secrets (API tokens, keys, etc.).
  # fetch-depth: 0 is required so gitleaks can diff the full history.
  # ---------------------------------------------------------------------------
  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
