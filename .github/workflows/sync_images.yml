name: Sync Images to R2 (manual)

# 通常は app_deploy.yml の `Sync referenced images to R2` ステップが
# 毎 deploy で同期するため、このワークフローは普段は使わない。
# main へ push せずに R2 だけ強制的に再同期したい場合 (例: バケット
# 復元後、orphan 検証後) に GitHub Actions UI から手動で起動する。

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-images
  cancel-in-progress: false

jobs:
  upload:
    name: Upload referenced images to R2
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Upload referenced images to R2
        run: npm run upload:images
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
