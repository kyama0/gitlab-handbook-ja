name: Sync Images to R2

# Periodically (and on-demand) sync images referenced by translated Markdown
# from upstream/static/ to the R2 bucket. The deploy workflow does NOT do this
# (it'd require checking out the upstream submodule on every deploy and would
# slow things down), so we run it on a weekly cron and as a manual trigger.

on:
  schedule:
    # Mondays at 02:30 UTC (= 11:30 JST). Adjust as needed.
    - cron: '30 2 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-images
  cancel-in-progress: false

jobs:
  upload:
    name: Upload referenced images to R2
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Upload referenced images to R2
        run: npm run upload:images
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
