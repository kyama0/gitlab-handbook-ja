name: Sync Images to R2 (manual)

# 通常は app_deploy.yml の `Sync referenced images to R2` ステップが
# 毎 deploy で同期するため、このワークフローは普段は使わない。
# main へ push せずに R2 だけ強制的に再同期したい場合 (例: バケット
# 復元後、orphan 検証後) に GitHub Actions UI から手動で起動する。

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-images
  cancel-in-progress: false

jobs:
  upload:
    name: Upload referenced images to R2
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: recursive

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Upload referenced images to R2
        run: npm run upload:images
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
