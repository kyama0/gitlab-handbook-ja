name: Translate upstream changes

on:
  schedule:
    - cron: '0 18 * * *'  # 毎日 JST 03:00 (UTC 18:00)
  workflow_dispatch:

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Sync upstream
        run: npm run sync:upstream

      - name: Translate changed files
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # TODO: feed the output of sync:upstream into translate.ts
          echo "translate step is a placeholder — wire up once sync-upstream.ts writes a queue file"

      - name: Upload new images to R2
        env:
          R2_ACCOUNT_ID:         ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:      ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY:  ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET:             ${{ secrets.R2_BUCKET }}
          PUBLIC_R2_BASE:        ${{ vars.PUBLIC_R2_BASE }}
        run: npm run upload:images

      - name: Open PR with translation changes
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6.1.0
        with:
          commit-message: 'chore(translate): sync upstream changes'
          title: 'chore(translate): sync upstream changes'
          branch: auto/translate
          body: |
            自動翻訳ジョブによる更新。原文の差分と用語の妥当性をレビューしてください。
