name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # upstream submodule を shallow checkout (165 MB 程度、~30 秒)。
          # upload-images-r2 が upstream/static/<path> を読むために必要。
          submodules: true
          fetch-depth: 1

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'go.mod'

      - uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3.2.1
        with:
          hugo-version: '0.151.0'
          extended: true

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Sync referenced images to R2 (idempotent)
        # 翻訳済みコンテンツが参照する画像のうち R2 に未アップロードのもの
        # だけを upstream/static/ から取得して送る。新規/変更のみ HEAD で
        # 検知してアップロードするので、毎回 deploy しても重くはならない。
        run: npm run upload:images
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: gitlab-handbook-ja-images

      - name: Sync upstream public data (team.yml, tech_stack.yml, ...)
        # docsy-gitlab モジュールの content/handbook/company/team.md など、
        # data/public/* を参照するページが多数あるため、upstream と同じ方式で
        # ビルド前に動的に取得する（git に入れない方針）。
        #
        # ワークアラウンド: release_post_managers.yml は www-gitlab-com から
        # 削除されて 404 を返すようになったが、upstream/scripts/sync-data.sh の
        # data_files にはまだ残っている。スクリプトは `set -eu` で走るため
        # 最初の 404 で sync 全体が落ち、Hugo ビルドに到達できない。
        # そこで対象エントリを sed で除外し、release-post-scheduling
        # shortcode（site.Data.public.release_post_managers.releases を range
        # する）が壊れないように空スタブを事前生成する。
        # upstream が参照を消したら本ステップは元に戻すこと。
        run: |
          sed -i '/release_post_managers\.yml/d' upstream/scripts/sync-data.sh
          mkdir -p data/public
          printf 'releases: []\n' > data/public/release_post_managers.yml
          bash upstream/scripts/sync-data.sh

      - name: Hugo build
        run: hugo --minify
        env:
          HUGO_BASEURL: ${{ vars.SITE_URL }}
          # /images/* リダイレクト先と Markdown image render hook が前置する
          # ベース URL を R2 公開エンドポイントに上書きする。未設定だと
          # config.yaml の default (handbook.gitlab.com) が使われ、本家への
          # ホットリンクになってしまう。
          # 注: param 名は camelCase (imageBaseUrl)。`HUGO` の直後 1 文字が
          # delimiter として推論される Hugo の仕様上、snake_case 名を
          # `HUGO_PARAMS_xxx` で渡すと `params.xxx.yyy.zzz` にネスト解釈
          # されて効かないため。
          # https://gohugo.io/configuration/introduction/
          HUGO_PARAMS_imageBaseUrl: ${{ vars.PUBLIC_R2_BASE }}
          # Google Analytics (GA4)。docsy の _partials/head.html が
          # hugo.IsProduction のとき Hugo 組み込み partial "google_analytics.html"
          # を呼び、それが services.googleAnalytics.id を読んで gtag を出力する。
          # config.yaml には GA キーを置かず、本番ビルド時のみ env で注入する
          # (ローカル hugo server は development 環境なので GA は出ない)。
          # HUGO_SERVICES_GOOGLEANALYTICS_ID は `_` 区切りで
          # services.googleanalytics.id に解決され、Hugo は config キーを
          # 小文字化して照合するので camelCase の googleAnalytics と一致する。
          # 測定 ID は client 側 HTML に露出する公開値 (infra/locals.tf の
          # PUBLIC_GA4_ID と同値)。GitHub Actions Variable PUBLIC_GA4_ID が
          # あればそれを使い、無ければリテラルにフォールバックする。
          HUGO_SERVICES_GOOGLEANALYTICS_ID: ${{ vars.PUBLIC_GA4_ID || 'G-ED5RXHWDV6' }}

      - name: Pagefind index (CJK-aware static site search)
        run: npx pagefind --site public

      # cloudflare/pages-action は deprecated で、内部の wrangler@2 が
      # 日本語を含むコミット本文を Cloudflare API に投げる際に
      # "Invalid commit message, it must be a valid UTF-8 string" で 8000111
      # を返してデプロイ全体を落とす不具合があるため wrangler-action に移行。
      - uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=gitlab-handbook-ja --branch=main --commit-dirty=true
