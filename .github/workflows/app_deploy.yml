name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # upstream submodule を shallow checkout (165 MB 程度、~30 秒)。
          # upload-images-r2 が upstream/static/<path> を読むために必要。
          submodules: true
          fetch-depth: 1

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'

      - uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3.2.1
        with:
          hugo-version: '0.151.0'
          extended: true

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Sync referenced images to R2 (idempotent)
        # 翻訳済みコンテンツが参照する画像のうち R2 に未アップロードのもの
        # だけを upstream/static/ から取得して送る。新規/変更のみ HEAD で
        # 検知してアップロードするので、毎回 deploy しても重くはならない。
        run: npm run upload:images
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: gitlab-handbook-ja-images

      - name: Sync upstream public data (team.yml, tech_stack.yml, ...)
        # docsy-gitlab モジュールの content/handbook/company/team.md など、
        # data/public/* を参照するページが多数あるため、upstream と同じ方式で
        # ビルド前に動的に取得する（git に入れない方針）。
        #
        # Workaround: release_post_managers.yml was removed from
        # www-gitlab-com (404) but is still listed in upstream/scripts/sync-data.sh.
        # `set -eu` aborts the script on first download failure, so we strip the
        # entry from the list and provide an empty stub for the
        # release-post-scheduling shortcode (which ranges
        # site.Data.public.release_post_managers.releases).
        # Remove once upstream drops the reference.
        run: |
          sed -i '/release_post_managers\.yml/d' upstream/scripts/sync-data.sh
          mkdir -p data/public
          printf 'releases: []\n' > data/public/release_post_managers.yml
          bash upstream/scripts/sync-data.sh

      - name: Hugo build
        run: hugo --minify
        env:
          HUGO_BASEURL: ${{ vars.SITE_URL }}
          # /images/* リダイレクト先と Markdown image render hook が前置する
          # ベース URL を R2 公開エンドポイントに上書きする。未設定だと
          # config.yaml の default (handbook.gitlab.com) が使われ、本家への
          # ホットリンクになってしまう。
          # 注: param 名は camelCase (imageBaseUrl)。`HUGO` の直後 1 文字が
          # delimiter として推論される Hugo の仕様上、snake_case 名を
          # `HUGO_PARAMS_xxx` で渡すと `params.xxx.yyy.zzz` にネスト解釈
          # されて効かないため。
          # https://gohugo.io/configuration/introduction/
          HUGO_PARAMS_imageBaseUrl: ${{ vars.PUBLIC_R2_BASE }}

      - name: Pagefind index (CJK-aware static site search)
        run: npx pagefind --site public

      - uses: cloudflare/pages-action@f0a1cd58cd66095dee69bfa18fa5efd1dde93bca # v1.5.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: gitlab-handbook-ja
          directory: public
          branch: main
