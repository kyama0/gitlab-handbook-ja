name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # upstream submodule を shallow checkout (165 MB 程度、~30 秒)。
          # upload-images-r2 が upstream/static/<path> を読むために必要。
          submodules: true
          fetch-depth: 1

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: '.tool-versions'

      - uses: peaceiris/actions-hugo@75d2e84710de30f6ff7268e08f310b60ef14033f # v3.0.0
        with:
          hugo-version: '0.151.0'
          extended: true

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Sync referenced images to R2 (idempotent)
        # 翻訳済みコンテンツが参照する画像のうち R2 に未アップロードのもの
        # だけを upstream/static/ から取得して送る。新規/変更のみ HEAD で
        # 検知してアップロードするので、毎回 deploy しても重くはならない。
        run: npm run upload:images
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}

      - name: Hugo build
        run: hugo --minify
        env:
          HUGO_BASEURL: ${{ vars.SITE_URL }}

      - name: Pagefind index (CJK-aware static site search)
        run: npx pagefind --site public

      - uses: cloudflare/pages-action@f0a1cd58cd66095dee69bfa18fa5efd1dde93bca # v1.5.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: gitlab-handbook-ja
          directory: public
          branch: main
