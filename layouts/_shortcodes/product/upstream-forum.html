<a href="/handbook/product/ux/upstream-forum/">Upstream Forum</a> は、UX チームメンバーが自分たちの取り組みを共有し、議論するための定期ミーティングです。
対象には過去、現在、将来の取り組みが含まれ、Product Design、UX Research、Technical Writing を扱います。
すべてのミーティングは録画され、Product、UX、Engineering、Leadership が都合のよいタイミングで視聴できるよう、<a href="https://www.youtube.com/playlist?list=PL05JrBw4t0Kq89nFXtkVviaIfYQPptwJz">Unfiltered</a> で公開されます。
