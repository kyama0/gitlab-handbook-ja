<a href="/handbook/product/ux/upstream-forum/">Upstream Forum</a> は、UX チームメンバーが自分の仕事を共有し、議論するための定期ミーティングです。
これには過去、現在、または将来の仕事が含まれ、Product Design、UX Research、Technical Writing を扱います。
すべてのミーティングは録画され、Product、UX、Engineering、Leadership が都合のよいときに視聴できるよう <a href="https://www.youtube.com/playlist?list=PL05JrBw4t0Kq89nFXtkVviaIfYQPptwJz">Unfiltered</a> で公開されます。
