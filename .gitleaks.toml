# gitleaks 設定
# デフォルトの gitleaks ルールを継承しつつ、本リポジトリ特有の誤検知を除外する。
[extend]
useDefault = true

# 翻訳ファイルの frontmatter にある `upstream_sha:` は git の commit SHA で、
# 機密情報ではない。ただし 40 桁 hex で、関連ページに「sourcegraph」というキーワードが
# 含まれると、gitleaks の `sourcegraph-access-token` ルール（`[a-fA-F0-9]{40}` を含む
# 緩い alternation）が誤検知する。これらを許可する。
#
# 設計判断:
#   - `paths` は使わず `regexes`（`regexTarget = "line"`）のみで判定する。
#     gitleaks の allowlist は `regexes` と `paths` の両方を指定すると OR 結合になる
#     （`condition = "AND"` は v8.24.3 で意図通り動作しないことをローカル検証で確認）。
#     CodeRabbit が指摘するとおり OR では「対象パスにあるだけで本物のトークンも素通り」する
#     ため、より制約の強い regex のみで判定し、安全性を担保する。
#   - `regexTarget = "line"` でマッチ対象を行全体に拡張する（既定の secret 部分のみだと
#     `upstream_sha:` プレフィックスが含まれずマッチできない）。
#   - 1つ目の regex は YAML frontmatter（`upstream_sha: <40hex>`）、
#     2つ目の regex は JSON manifest（`"upstream_sha": "<40hex>"`）にマッチする。
#     どちらも `upstream_sha` キーの後に 40 桁 hex が続く非常に固定的な形なので、
#     本物の Sourcegraph token がこの形で出現することは実質的にあり得ず、
#     誤検知のみを抑止できる。
[[rules]]
id = "sourcegraph-access-token"
description = "Sourcegraph access token (overridden to refine allowlist)"
regex = '''\b(sgp_(?:[a-fA-F0-9]{16}|local)_[a-fA-F0-9]{40}|[a-fA-F0-9]{40})\b'''
keywords = ["sourcegraph"]

[rules.allowlist]
description = "translation manifest upstream_sha (commit hash, not a token)"
regexTarget = "line"
regexes = [
  '''upstream_sha:\s*[a-fA-F0-9]{40}''',
  '''"upstream_sha"\s*:\s*"[a-fA-F0-9]{40}"''',
]

# PSIRT runbook (hackerone-process.md) のコードブロックには
# `Authorization: Bearer LEAKED_TOKEN` という *リテラルなプレースホルダー* が含まれており、
# gitleaks の `curl-auth-header` ルールが「本物の Bearer トークン」として誤検知する。
# これは upstream 由来のサンプル文字列で、実際の機密情報ではないため許可する。
#
# 設計判断:
#   - `regexTarget = "line"` で行全体にマッチさせ、`LEAKED_TOKEN` という固定文字列
#     を含む行のみを許可する（`Bearer` の後に何でも来る形だと本物のトークンも
#     通ってしまうため、必ず `LEAKED_TOKEN` を含む行に限定する）。
#   - グローバル `[allowlist]` だとルール固有のオーバーライドが上書きされる可能性があるため、
#     `curl-auth-header` ルールを明示的にオーバーライドして allowlist を付与する。
[[rules]]
id = "curl-auth-header"
description = "Curl Authorization header (overridden to allow LEAKED_TOKEN placeholder)"
regex = '''(?i)\b(?:curl[^\n]*?-H\s+["'])(?i)Authorization:\s+(?:Bearer|Basic|Token)\s+([^"'\s]+)["']'''
keywords = ["curl", "authorization"]

[rules.allowlist]
description = "PSIRT runbook placeholder string LEAKED_TOKEN"
regexTarget = "line"
regexes = [
  '''Authorization:\s+Bearer\s+LEAKED_TOKEN''',
]

# Zendesk API ドキュメント (zendesk/api/_index.md) のコードブロックには
# `curl ... -u jcolyer@example.com:my_password` という *サンプルの Basic 認証情報* が
# 含まれており、gitleaks の `curl-auth-user` ルールが「本物の認証情報」として誤検知する。
# これは upstream 由来の固定サンプル（メールアドレス `jcolyer@example.com` と
# 文字列 `my_password`）で、実際の機密情報ではないため許可する。
#
# 設計判断:
#   - `regexTarget = "line"` で行全体にマッチさせ、`my_password` という固定文字列
#     を含む `-u ...` の行のみを許可する。`-u user:` 部分が一致しても通せるよう、
#     プレースホルダーを示す固定値（`example.com` ドメインかつ `my_password` パスワード）
#     を含む行に限定する。
[[rules]]
id = "curl-auth-user"
description = "Curl basic-auth -u flag (overridden to allow my_password placeholder)"
regex = '''\bcurl[^\n]*?\s-u\s+["']?([^"'\s:]+):([^"'\s]+)["']?'''
keywords = ["curl"]

[rules.allowlist]
description = "Zendesk API docs sample placeholder my_password"
regexTarget = "line"
regexes = [
  '''-u\s+jcolyer@example\.com:my_password''',
]

# Education Services の教材ページには学習用のサンプル値が含まれており、
# gitleaks の `gitlab-runner-authentication-token` / `private-key` ルールに
# 実トークンとして検出される。これらは upstream の教育コンテンツに由来する
# 固定サンプル（GitLab Education Services のラボ手順）であり、本物の機密情報
# ではないため、ファイル単位で許可する。
#
# 設計判断:
#   - `paths` は gitleaks の allowlist で正規表現として評価され、`MatchString()` で
#     部分一致する。意図せず広いファイル群が許可されないよう、必ず `^…$` で
#     パス全体に完全一致させ、ドット (`.`) もエスケープする。
#   - グローバル allowlist にすることで、将来 upstream が別形式の追加サンプルを
#     増やした場合でも追従しやすくする（教材ページは翻訳パイプラインで自動同期
#     するのみで、私たちが新規にトークンを書き込むことはない）。
[allowlist]
description = "Upstream education-services lab pages contain sample tokens/keys for training"
paths = [
  '''^content/ja/handbook/customer-success/professional-services-engineering/education-services/secessentialshandson1\.md$''',
  '''^content/ja/handbook/customer-success/professional-services-engineering/education-services/ilt-labs/advgitlabcicdhandsonlab1\.md$''',
]

# mr-reviews/_index.md には upstream に由来する
# `GITLAB_QA_ACCESS_TOKEN=asdfASDF1234-` という *リテラルなプレースホルダー* が
# 含まれており、gitleaks の `generic-api-key` ルールが「本物の API キー」として
# 誤検知する。upstream 原文に同じ文字列が存在し、実際の機密情報ではないため許可する。
#
# 設計判断:
#   - `regexTarget = "line"` で行全体にマッチさせ、固定文字列
#     `GITLAB_QA_ACCESS_TOKEN=asdfASDF1234-` を含む行のみを許可する。
#   - グローバル `[allowlist]` だとルール固有のオーバーライドが上書きされる
#     可能性があるため、ルール単位で allowlist を定義する。
[[rules]]
id = "generic-api-key"
description = "Generic API Key (overridden to allow GITLAB_QA_ACCESS_TOKEN placeholder)"
regex = '''(?i)(?:key|api|token|secret|client|passwd|password|auth|access)(?:[0-9a-z\-_\t .]{0,20})(?:[\s|']|[\s|"]){0,3}(?:=|>|:{1,3}=|\|\|:|<=|=>|:){1}(?:'|\"|\s|=|\x60){0,5}([0-9a-z\-_.=]{10,150})(?:['|\"|\n|\r|\s|\x60|;]|$)'''
keywords = [
  "key",
  "api",
  "token",
  "secret",
  "client",
  "passwd",
  "password",
  "auth",
  "access",
]

[rules.allowlist]
description = "Upstream mr-reviews docs sample placeholder asdfASDF1234-"
regexTarget = "line"
regexes = [
  '''GITLAB_QA_ACCESS_TOKEN=asdfASDF1234-''',
]
